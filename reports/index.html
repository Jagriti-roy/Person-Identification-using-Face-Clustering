
        <!DOCTYPE html>

        <html>

        <head>

        <meta charset="utf-8">

        <title>Person Identification Analytics</title>

        <style>

        .container{
        max-width:1250px;
        margin:auto;
        }

        .header{
        background:#2563eb;
        color:white;
        padding:25px;
        border-radius:10px;
        text-align:center;
        margin-bottom:30px;
        }

        .header h1{
        font-size:34px;
        margin-bottom:8px;
        }

        .header p{
        font-size:17px;
        opacity:.9;
        }

        .section{
        background:white;
        padding:25px;
        border-radius:10px;
        box-shadow:0 2px 10px rgba(0,0,0,.08);
        margin-bottom:35px;
        }

        .section h2{
        margin-bottom:20px;
        color:#2563eb;
        font-size:24px;
        }

        .gallery{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
        gap:20px;
        }

        .gallery-card{
        background:#fafafa;
        padding:15px;
        border:1px solid #ddd;
        border-radius:10px;
        text-align:center;
        }

        .gallery-card img{
        width:100%;
        border-radius:8px;
        }

        .gallery-card h3{
        margin-bottom:12px;
        color:#333;
        }


        .footer{
        margin-top:40px;
        text-align:center;
        font-size:14px;
        color:#777;
        }

        </style>

        </head>

        <body>

        <div class="container">

        <div class="header">

        <h1>Person Identification Analytics</h1>


        </div>

        <div class="section">

        <h2>Cluster Gallery</h2>

        <div class="gallery">

        

                <div class="gallery-card">

                    <h3>Cluster 0</h3>

                    <img src="cluster_gallery/cluster_0.png">

                </div>

                

                <div class="gallery-card">

                    <h3>Cluster 1</h3>

                    <img src="cluster_gallery/cluster_1.png">

                </div>

                

                <div class="gallery-card">

                    <h3>Cluster 2</h3>

                    <img src="cluster_gallery/cluster_2.png">

                </div>

                

        </div>

        </div>


        </div>

        </body>

        </html>
